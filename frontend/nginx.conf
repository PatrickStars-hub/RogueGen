server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # 前端路由 fallback（React Router）
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 转发 API 请求到后端
    location /api/ {
        proxy_pass http://backend:8765;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;

        # SSE 支持（流式响应）
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
    }

    # 转发静态资源（游戏图片等）
    location /static/ {
        proxy_pass http://backend:8765;
        proxy_set_header Host $host;
    }
}
